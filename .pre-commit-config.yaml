repos:
  - repo: https://github.com/psf/black
    rev: 22.8.0 # Available tags: https://github.com/psf/black/tags
    hooks:
      - id: black

  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: "v2.2.1" # Available tags: https://github.com/pre-commit/mirrors-prettier/tags
    hooks:
      - id: prettier

  - repo: https://github.com/pycqa/flake8
    rev: "5.0.4" # Available tags: https://github.com/pycqa/flake8/tags
    hooks:
      - id: flake8
        args: ["--max-line-length=120", --ignore, E203 W503]

  - repo: https://github.com/PyCQA/bandit
    rev: "1.7.0" # See https://github.com/PyCQA/bandit/tags
    hooks:
      - id: bandit
        # remove "assert" tests and hardcoded_bind_all_interfaces (needed by Fastapi)
        args: [--skip, "B101,B104", -x, "**/test_*.py"]
